<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/LogoSoloMonocromatico.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitOne | Soluciones Tecnológicas de Alto Impacto</title>

  <!-- Preconnect to Sanity API for faster data fetching -->
  <link rel="preconnect" href="https://fjtg86e5.apicdn.sanity.io" />

  <!-- Google Fonts loaded asynchronously to prevent render blocking -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;700;900&display=swap">
  </noscript>
</head>

<body>
  <div id="root">
    <style>
      /* Preloader ultraligero inyectado en el HTML */
      body { background-color: #0f172a; margin: 0; }
      .app-preloader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(0, 242, 254, 0.08) 0%, transparent 70%);
      }
      .preloader-pulse {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #00f2fe;
        opacity: 0.6;
        animation: preloader-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      @keyframes preloader-ping {
        75%, 100% { transform: scale(2); opacity: 0; }
      }
    </style>
    <div class="app-preloader">
      <div class="preloader-pulse"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
